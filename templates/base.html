<!DOCTYPE html>
<html lang="es" class="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}MediCore{% endblock %} — Sistema Clínico</title>

  <script src="https://cdn.tailwindcss.com"></script>
  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet" />
  
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  
  <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            display: ['Syne', 'sans-serif'],
            body: ['DM Sans', 'sans-serif'],
          },
          colors: {
            med: {
              50: '#edfcf9',
              100: '#d2f7f1',
              200: '#a9ede4',
              300: '#6dddd3',
              400: '#35c4bc',
              500: '#1ca8a2',
              600: '#158680',
              700: '#146b67',
              800: '#145553',
              900: '#154745',
              950: '#062f2e',
            },
            surface: {
              950: '#080d0d',
              900: '#0d1515',
              800: '#111e1e',
              750: '#152323',
              700: '#1a2b2b',
              600: '#1f3232',
              500: '#264040',
            },
            danger: '#f43f5e',
            warning: '#f59e0b',
            success: '#10b981',
          },
          boxShadow: {
            'med-glow': '0 0 24px 0 rgba(28,168,162,0.18)',
            'med-glow-lg': '0 0 48px 0 rgba(28,168,162,0.22)',
            'card': '0 2px 16px 0 rgba(0,0,0,0.45)',
          },
          keyframes: {
            'fade-in': { from: { opacity: '0', transform: 'translateY(8px)' }, to: { opacity: '1', transform: 'translateY(0)' } },
            'slide-in': { from: { opacity: '0', transform: 'translateX(-12px)' }, to: { opacity: '1', transform: 'translateX(0)' } },
            'pulse-dot': { '0%,100%': { opacity: '1' }, '50%': { opacity: '0.4' } },
          },
          animation: {
            'fade-in': 'fade-in 0.35s ease both',
            'slide-in': 'slide-in 0.3s ease both',
            'pulse-dot': 'pulse-dot 1.8s ease-in-out infinite',
          },
        }
      }
    }
  </script>
</head>

<body class="bg-surface-900 text-slate-200 min-h-screen bg-noise antialiased">
  <div class="flex h-screen overflow-hidden">

    <aside id="sidebar" class="fixed inset-y-0 left-0 z-40 w-64 flex flex-col
                  bg-surface-750 border-r border-surface-600
                  transition-transform duration-300 ease-in-out
                  lg:static lg:translate-x-0
                  -translate-x-full">

      <div class="flex items-center gap-3 px-5 py-5 border-b border-surface-600">
        <div class="flex-shrink-0 w-9 h-9 rounded-xl bg-med-500 flex items-center justify-center shadow-med-glow">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"
            stroke-linecap="round">
            <path d="M12 5v14M5 12h14" />
          </svg>
        </div>
        <div>
          <span class="font-display text-lg font-bold text-white tracking-tight">Medi<span
              class="text-med-400">Core</span></span>
        </div>
      </div>

      <nav class="flex-1 overflow-y-auto py-5 px-3 space-y-1">

        <!-- Home -->
        <a href="{{ url_for('inicio') }}" class="nav-item relative flex items-center gap-3 px-3 py-2.5 rounded-lg
                  text-slate-300 hover:text-white hover:bg-surface-700
                  transition-all duration-150 group {{ is_active('/') }}">
          <i data-lucide="layout-dashboard" class="w-4 h-4 flex-shrink-0 text-med-400"></i>
          <span class="text-sm font-medium">Inicio</span>
        </a>

        <!-- Usuarios -->
        <a href="{{ url_for('usuario.index') }}" class="nav-item relative flex items-center gap-3 px-3 py-2.5 rounded-lg
                  text-slate-300 hover:text-white hover:bg-surface-700
                  transition-all duration-150 group {{ is_active('/usuarios') }}">
          <i data-lucide="shield-check" class="w-4 h-4 flex-shrink-0 text-med-400"></i>
          <span class="text-sm font-medium">Usuarios</span>
        </a>

        <!-- Pacientes -->
        <a href="{{ url_for('paciente.index') }}" class="nav-item relative flex items-center gap-3 px-3 py-2.5 rounded-lg
                  text-slate-300 hover:text-white hover:bg-surface-700
                  transition-all duration-150 group {{ is_active('/pacientes') }}">
          <i data-lucide="user-round" class="w-4 h-4 flex-shrink-0 text-med-400"></i>
          <span class="text-sm font-medium">Pacientes</span>
        </a>

        <!-- Médicos -->
        <a href="{{ url_for('medico.index') }}" class="nav-item relative flex items-center gap-3 px-3 py-2.5 rounded-lg
                  text-slate-300 hover:text-white hover:bg-surface-700
                  transition-all duration-150 group {{ is_active('/medicos') }}">
          <i data-lucide="stethoscope" class="w-4 h-4 flex-shrink-0 text-med-400"></i>
          <span class="text-sm font-medium">Médicos</span>
        </a>

        <!-- Consultas Médicas -->
        <a href="{{ url_for('consulta_medica.index') }}" class="nav-item relative flex items-center gap-3 px-3 py-2.5 rounded-lg
                  text-slate-300 hover:text-white hover:bg-surface-700
                  transition-all duration-150 group {{ is_active('/consultas_medicas') }}">
          <i data-lucide="clipboard-plus" class="w-4 h-4 flex-shrink-0 text-med-400"></i>
          <span class="text-sm font-medium">Consultas Médicas</span>
        </a>

      </nav>

      <div class="border-t border-surface-600 px-4 py-4">
        <div class="flex items-center justify-between">
          <div>
            <p class="text-xs flex items-center gap-1.5">Sistema Clinico</p>
            <p class="text-[10px] text-slate-500 mt-1">MediCore</p>
          </div>
          <div class="w-9 h-9 rounded-xl bg-med-500/15 flex items-center justify-center">
            <i data-lucide="shield-check" class="w-4 h-4 text-med-200"></i>
          </div>
        </div>
      </div>
    </aside>

    <div id="sidebar-overlay" class="fixed inset-0 z-30 bg-black/60 backdrop-blur-sm hidden lg:hidden"
      onclick="toggleSidebar()"></div>
    <div class="flex-1 flex flex-col min-w-0 overflow-hidden">

      <header class="flex-shrink-0 h-16 flex items-center justify-between
                     px-4 md:px-6
                     bg-surface-800 border-b border-surface-600
                     shadow-card z-20">
        <div class="flex items-center gap-4">

          <button onclick="toggleSidebar()"
            class="lg:hidden p-2 rounded-lg text-slate-400 hover:text-white hover:bg-surface-700 transition-colors">
            <i data-lucide="menu" class="w-5 h-5"></i>
          </button>

          <div class="flex items-center gap-2.5">
            <span class="hidden md:flex items-center gap-2 text-slate-500">
              <i data-lucide="chevron-right" class="w-3.5 h-3.5"></i>
              <span class="text-sm text-slate-400">
                {% block breadcrumb %}Inicio{% endblock %}
              </span>
            </span>
          </div>
        </div>

        <div class="flex items-center gap-2 md:gap-3">
          <div class="w-px h-6 bg-surface-600 hidden sm:block"></div>
          <div class="relative group">

            <button class="flex items-center gap-2.5 pl-1 pr-3 py-1.5 rounded-xl hover:bg-surface-700 transition-all duration-150">
              <div class="relative">
                <div class="w-8 h-8 rounded-full bg-gradient-to-br from-med-400 to-med-700
                              flex items-center justify-center text-white
                              font-display font-bold text-sm shadow-med-glow ring-2 ring-med-500/30">
                  {{ session.get('username', '')[:1] | upper }}
                </div>
              </div>

              <div class="hidden md:block text-left">
                <p class="text-sm font-semibold text-white leading-tight">{{ session.get('username', 'Usuario') }}</p>
                <p class="text-[11px] text-slate-500 leading-tight">Rol: {{ session.get('rol', 'Sin rol') }}</p>
              </div>
              <i data-lucide="chevron-down"
                class="w-3.5 h-3.5 text-slate-500 hidden md:block transition-transform group-hover:rotate-180 duration-200"></i>
            </button>

            <div class="absolute right-0 top-full mt-2 w-52
                        bg-surface-800 border border-surface-600 rounded-xl shadow-card
                        opacity-0 invisible group-hover:opacity-100 group-hover:visible
                        translate-y-1 group-hover:translate-y-0
                        transition-all duration-200 z-50 overflow-hidden">

              <div class="border-t border-surface-600 py-1.5">
                <a href="{{ url_for('auth.logout') }}"
                  class="flex items-center gap-2.5 px-4 py-2 text-sm text-danger hover:bg-danger/10 transition-colors">
                  <i data-lucide="log-out" class="w-3.5 h-3.5"></i> Cerrar Sesión
                </a>
              </div>

            </div>
          </div>
        </div>
      </header>

      <!--CONTENIDO-->
      <main class="flex-1 overflow-y-auto bg-surface-900 animate-fade-in">
        <div class="p-4 md:p-6 lg:p-8 max-w-screen-2xl mx-auto">
          {% block content %}{% endblock %}
        </div>
      </main>

    </div>
  </div>
  <script src="{{ url_for('static', filename='js/modal.js') }}"></script>
  <script>
    lucide.createIcons();

    function toggleSidebar() {
      const sidebar = document.getElementById('sidebar');
      const overlay = document.getElementById('sidebar-overlay');
      const isOpen = !sidebar.classList.contains('-translate-x-full');
      sidebar.classList.toggle('-translate-x-full', isOpen);
      overlay.classList.toggle('hidden', isOpen);
    }
    document.addEventListener('DOMContentLoaded', () => lucide.createIcons());
  </script>

  {% block extra_scripts %}{% endblock %}
  {% include 'components/delete_modal.html' %}
</body>
</html>
