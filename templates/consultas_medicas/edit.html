{% extends "base.html" %}
{% block title %}Editar Consulta Médica{% endblock %}
{% block breadcrumb %}Consultas Médicas / Editar{% endblock %}

{% block content %}

<div class="flex items-center gap-4 mb-7">
  <a href="{{ url_for('consulta_medica.index') }}" class="p-2 rounded-xl bg-surface-800 border border-surface-600
            text-slate-400 hover:text-white hover:border-surface-500
            transition-all duration-150">
    <i data-lucide="arrow-left" class="w-4 h-4"></i>
  </a>
  <div>
    <h1 class="font-display text-2xl font-bold text-white tracking-tight">Editar Consulta Médica</h1>
    <p class="text-sm text-slate-500 mt-0.5">Modifica los datos de la consulta</p>
  </div>
</div>

<div class="max-w-xl">
  <div class="bg-surface-800 border border-surface-600 rounded-2xl shadow-card overflow-hidden">

    <div class="flex items-center gap-3 px-6 py-4 border-b border-surface-600 bg-surface-750">
      <div class="w-8 h-8 rounded-lg bg-med-500/20 flex items-center justify-center">
        <i data-lucide="file-pen-line" class="w-4 h-4 text-med-400"></i>
      </div>
      <h2 class="font-display font-semibold text-white text-sm">Datos de la consulta</h2>
    </div>

    <form method="POST" action="{{ url_for('consulta_medica.edit', id=consulta_medica.id_consulta) }}"
      class="px-6 py-6 space-y-5">

      <!-- Fecha -->
      <div class="space-y-1.5">
        <label for="fecha" class="block text-xs font-semibold text-slate-400 uppercase tracking-wider">
          Fecha <span class="text-red-400">*</span>
        </label>
        <div class="relative">
          <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 pointer-events-none">
            <i data-lucide="calendar" class="w-4 h-4 text-slate-500"></i>
          </span>
          <input type="date" id="fecha" name="fecha" value="{{ consulta_medica.fecha.strftime('%Y-%m-%d') }}" required
            class="w-full bg-surface-700 border border-surface-500 text-white
                        rounded-xl pl-10 pr-4 py-3 text-sm
                        focus:outline-none focus:border-med-500 focus:ring-2 focus:ring-med-500/20
                        transition-all duration-200
                        [color-scheme:dark]" />
        </div>
      </div>

      <!-- Médico -->
      <div class="space-y-1.5">
        <label for="id_cliente" class="block text-xs font-semibold text-slate-400 uppercase tracking-wider">
          Médico <span class="text-red-400">*</span>
        </label>
        <div class="relative">
          <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 pointer-events-none">
            <i data-lucide="stethoscope" class="w-4 h-4 text-slate-500"></i>
          </span>
          <select id="id_medico" name="id_medico" required class="w-full bg-surface-700 border border-surface-500 text-white
                         rounded-xl pl-10 pr-10 py-3 text-sm appearance-none
                         focus:outline-none focus:border-med-500 focus:ring-2 focus:ring-med-500/20
                         transition-all duration-200">
            <option value="" disabled class="text-slate-500">Selecciona un médico...</option>
            {% for medico in medicos %}
            <option value="{{ medico.id_medico }}" {% if medico.id_medico==consulta_medica.id_medico %}selected{% endif %}>
              {{ medico.nombre }}
            </option>
            {% endfor %}
          </select>
          <span class="absolute inset-y-0 right-0 flex items-center pr-3.5 pointer-events-none">
            <i data-lucide="chevron-down" class="w-4 h-4 text-slate-500"></i>
          </span>
        </div>
      </div>

      <!-- Paciente -->
      <div class="space-y-1.5">
        <label for="id_paciente" class="block text-xs font-semibold text-slate-400 uppercase tracking-wider">
          Paciente <span class="text-red-400">*</span>
        </label>
        <div class="relative">
          <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 pointer-events-none">
            <i data-lucide="user" class="w-4 h-4 text-slate-500"></i>
          </span>
          <select id="id_paciente" name="id_paciente" required class="w-full bg-surface-700 border border-surface-500 text-white
                         rounded-xl pl-10 pr-10 py-3 text-sm appearance-none
                         focus:outline-none focus:border-med-500 focus:ring-2 focus:ring-med-500/20
                         transition-all duration-200">
            <option value="" disabled class="text-slate-500">Selecciona un paciente...</option>
            {% for paciente in pacientes %}
            <option value="{{ paciente.id_paciente }}" {% if paciente.id_paciente==consulta_medica.id_paciente %}selected{% endif
              %}>
              {{ paciente.nombre }}
            </option>
            {% endfor %}
          </select>
          <span class="absolute inset-y-0 right-0 flex items-center pr-3.5 pointer-events-none">
            <i data-lucide="chevron-down" class="w-4 h-4 text-slate-500"></i>
          </span>
        </div>
      </div>

      <!-- Diagnóstico -->
      <div class="space-y-1.5">
        <label for="diagnostico" class="block text-xs font-semibold text-slate-400 uppercase tracking-wider">
          Diagnóstico <span class="text-red-400">*</span>
        </label>
        <div class="relative">
          <span class="absolute top-3 left-3.5 pointer-events-none">
            <i data-lucide="file-text" class="w-4 h-4 text-slate-500"></i>
          </span>
          <textarea id="diagnostico" name="diagnostico" required maxlength="300" rows="3" class="w-full bg-surface-700 border border-surface-500 text-white
                           placeholder-slate-600 rounded-xl pl-10 pr-4 py-3 text-sm
                           resize-none
                           focus:outline-none focus:border-med-500 focus:ring-2 focus:ring-med-500/20
                           transition-all duration-200">{{ consulta_medica.diagnostico }}</textarea>
        </div>
      </div>

      <!-- Tratamiento -->
      <div class="space-y-1.5">
        <label for="tratamiento" class="block text-xs font-semibold text-slate-400 uppercase tracking-wider">
          Tratamiento <span class="text-red-400">*</span>
        </label>
        <div class="relative">
          <span class="absolute top-3 left-3.5 pointer-events-none">
            <i data-lucide="pill" class="w-4 h-4 text-slate-500"></i>
          </span>
          <textarea id="tratamiento" name="tratamiento" required maxlength="300" rows="3" class="w-full bg-surface-700 border border-surface-500 text-white
                           placeholder-slate-600 rounded-xl pl-10 pr-4 py-3 text-sm
                           resize-none
                           focus:outline-none focus:border-med-500 focus:ring-2 focus:ring-med-500/20
                           transition-all duration-200">{{ consulta_medica.tratamiento }}</textarea>
        </div>
      </div>

      <!-- Botones -->
      <div class="flex gap-3 pt-2">

        <a href="{{ url_for('consulta_medica.index') }}" class="flex-1 flex items-center justify-center gap-2 px-4 py-3 rounded-xl
                  border border-surface-500 text-slate-300
                  hover:bg-surface-700 hover:text-white
                  transition-all duration-150 text-sm font-medium">
          Cancelar
        </a>

        <button type="submit" class="flex-1 flex items-center justify-center gap-2 px-4 py-3 rounded-xl
                       bg-med-500 hover:bg-med-600 active:bg-med-700
                       text-white text-sm font-semibold
                       shadow-[0_0_20px_rgba(28,168,162,0.2)] hover:shadow-none
                       transition-all duration-200">
          <i data-lucide="save" class="w-4 h-4"></i>
          Guardar Cambios
        </button>

      </div>
    </form>
  </div>
</div>

{% endblock %}
