{% extends "base.html" %}
{% block title %}Nuevo Usuario{% endblock %}
{% block breadcrumb %}Usuario / Crear{% endblock %}

{% block content %}

<div class="flex items-center gap-4 mb-7">
  <a href="{{ url_for('usuario.index') }}" class="p-2 rounded-xl bg-surface-800 border border-surface-600
            text-slate-400 hover:text-white hover:border-surface-500
            transition-all duration-150">
    <i data-lucide="arrow-left" class="w-4 h-4"></i>
  </a>
  <div>
    <h1 class="font-display text-2xl font-bold text-white tracking-tight">Nuevo Usuario</h1>
    <p class="text-sm text-slate-500 mt-0.5">Crea una cuenta de acceso al sistema</p>
  </div>
</div>



<div class="max-w-xl">
  <div class="bg-surface-800 border border-surface-600 rounded-2xl shadow-card overflow-hidden">

    <div class="flex items-center gap-3 px-6 py-4 border-b border-surface-600 bg-surface-750">
      <div class="w-8 h-8 rounded-lg bg-med-500/20 flex items-center justify-center">
        <i data-lucide="user-plus" class="w-4 h-4 text-med-400"></i>
      </div>
      <h2 class="font-display font-semibold text-white text-sm">Información del usuario</h2>
    </div>

    <form method="POST" action="{{ url_for('usuario.create') }}" class="px-6 py-6 space-y-5">

      <!-- Username -->
      <div class="space-y-1.5">
        <label for="username" class="block text-xs font-semibold text-slate-400 uppercase tracking-wider">
          Nombre de usuario <span class="text-red-400">*</span>
        </label>
        <div class="relative">
          <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 pointer-events-none">
            <i data-lucide="user" class="w-4 h-4 text-slate-500"></i>
          </span>
          <input type="text" id="username" name="username" placeholder="ej: dr.perez" required class="w-full bg-surface-700 border border-surface-500 text-white
                        placeholder-slate-600 rounded-xl pl-10 pr-4 py-3 text-sm
                        focus:outline-none focus:border-med-500 focus:ring-2 focus:ring-med-500/20
                        transition-all duration-200" />
        </div>
      </div>

      <!-- Password -->
      <div class="space-y-1.5">
        <label for="password" class="block text-xs font-semibold text-slate-400 uppercase tracking-wider">
          Contraseña <span class="text-red-400">*</span>
        </label>
        <div class="relative">
          <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 pointer-events-none">
            <i data-lucide="lock-keyhole" class="w-4 h-4 text-slate-500"></i>
          </span>
          <input type="password" id="password" name="password" placeholder="Mínimo 6 caracteres" required class="w-full bg-surface-700 border border-surface-500 text-white
                        placeholder-slate-600 rounded-xl pl-10 pr-11 py-3 text-sm
                        focus:outline-none focus:border-med-500 focus:ring-2 focus:ring-med-500/20
                        transition-all duration-200" />

          <button type="button" onclick="togglePass('password','eye-create')"
            class="absolute inset-y-0 right-0 flex items-center pr-3.5 text-slate-500 hover:text-med-400 transition-colors">
            <i id="eye-create" data-lucide="eye" class="w-4 h-4"></i>
          </button>

        </div>
      </div>

      <!-- Rol -->
      <div class="space-y-1.5">
        <label for="rol" class="block text-xs font-semibold text-slate-400 uppercase tracking-wider">
          Rol <span class="text-red-400">*</span>
        </label>
        <div class="relative">
          <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 pointer-events-none">
            <i data-lucide="shield" class="w-4 h-4 text-slate-500"></i>
          </span>
          <select id="rol" name="rol" required class="w-full bg-surface-700 border border-surface-500 text-white
                         rounded-xl pl-10 pr-4 py-3 text-sm appearance-none cursor-pointer
                         focus:outline-none focus:border-med-500 focus:ring-2 focus:ring-med-500/20
                         transition-all duration-200">
            <option value="" disabled selected class="text-slate-500">Selecciona un rol</option>
            <option value="admin">Administrador</option>
            <option value="medico">Médico</option>
            <option value="enfermero">Enfermero</option>
          </select>
          <span class="absolute inset-y-0 right-0 flex items-center pr-3.5 pointer-events-none">
            <i data-lucide="chevron-down" class="w-4 h-4 text-slate-500"></i>
          </span>
        </div>
      </div>

      <!-- Botones -->
      <div class="flex gap-3 pt-2">

        <a href="{{ url_for('usuario.index') }}" class="flex-1 flex items-center justify-center gap-2 px-4 py-3 rounded-xl
                  border border-surface-500 text-slate-300
                  hover:bg-surface-700 hover:text-white
                  transition-all duration-150 text-sm font-medium">
          Cancelar
        </a>

        <button type="submit" class="flex-1 flex items-center justify-center gap-2 px-4 py-3 rounded-xl
                       bg-med-500 hover:bg-med-600 active:bg-med-700
                       text-white text-sm font-semibold
                       shadow-[0_0_20px_rgba(28,168,162,0.2)] hover:shadow-none
                       transition-all duration-200">
          <i data-lucide="save" class="w-4 h-4"></i>
          Crear Usuario
        </button>

      </div>
    </form>
  </div>
</div>

{% endblock %}

{% block extra_scripts %}
<script>
  function togglePass(inputId, iconId) {
    const input = document.getElementById(inputId);
    const icon = document.getElementById(iconId);
    input.type = input.type === 'password' ? 'text' : 'password';
    icon.setAttribute('data-lucide', input.type === 'password' ? 'eye' : 'eye-off');
    lucide.createIcons();
  }
</script>
{% endblock %}
