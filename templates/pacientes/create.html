{% extends "base.html" %}
{% block title %}Nuevo Paciente{% endblock %}
{% block breadcrumb %}Pacientes / Nuevo{% endblock %}

{% block content %}

<div class="flex items-center gap-4 mb-7">
  <a href="{{ url_for('paciente.index') }}" class="p-2 rounded-xl bg-surface-800 border border-surface-600
            text-slate-400 hover:text-white hover:border-surface-500
            transition-all duration-150">
    <i data-lucide="arrow-left" class="w-4 h-4"></i>
  </a>
  <div>
    <h1 class="font-display text-2xl font-bold text-white tracking-tight">Nuevo Paciente</h1>
    <p class="text-sm text-slate-500 mt-0.5">Completa los datos para registrar un paciente</p>
  </div>
</div>

<div class="max-w-xl">
  <div class="bg-surface-800 border border-surface-600 rounded-2xl shadow-card overflow-hidden">

    <!-- Header tarjeta -->
    <div class="flex items-center gap-3 px-6 py-4 border-b border-surface-600 bg-surface-750">
      <div class="w-8 h-8 rounded-lg bg-med-500/20 flex items-center justify-center">
        <i data-lucide="user-plus" class="w-4 h-4 text-med-400"></i>
      </div>
      <h2 class="font-display font-semibold text-white text-sm">Datos del paciente</h2>
    </div>

    <form method="POST" action="{{ url_for('paciente.create') }}" class="px-6 py-6 space-y-5">

      <!-- Nombre -->
      <div class="space-y-1.5">
        <label for="nombre" class="block text-xs font-semibold text-slate-400 uppercase tracking-wider">
          Nombre completo <span class="text-red-400">*</span>
        </label>
        <div class="relative">
          <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 pointer-events-none">
            <i data-lucide="user" class="w-4 h-4 text-slate-500"></i>
          </span>
          <input type="text" id="nombre" name="nombre" placeholder="ej: María González" required class="w-full bg-surface-700 border border-surface-500 text-white
                        placeholder-slate-600 rounded-xl pl-10 pr-4 py-3 text-sm
                        focus:outline-none focus:border-med-500 focus:ring-2 focus:ring-med-500/20
                        transition-all duration-200" />
        </div>
      </div>

      <!-- Edad -->
      <div class="space-y-1.5">
        <label for="edad" class="block text-xs font-semibold text-slate-400 uppercase tracking-wider">
          Edad <span class="text-red-400">*</span>
        </label>
        <div class="relative">
          <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 pointer-events-none">
            <i data-lucide="calendar" class="w-4 h-4 text-slate-500"></i>
          </span>
          <input type="number" id="edad" name="edad" placeholder="ej: 34" required min="0" max="120" maxlength="2" class="w-full bg-surface-700 border border-surface-500 text-white
                        placeholder-slate-600 rounded-xl pl-10 pr-16 py-3 text-sm
                        focus:outline-none focus:border-med-500 focus:ring-2 focus:ring-med-500/20
                        transition-all duration-200" />
          <span class="absolute inset-y-0 right-0 flex items-center pr-4 text-slate-500 text-xs pointer-events-none">
            años
          </span>
        </div>
      </div>

      <!-- Dirección -->
      <div class="space-y-1.5">
        <label for="direccion" class="block text-xs font-semibold text-slate-400 uppercase tracking-wider">
          Dirección <span class="text-red-400">*</span>
        </label>
        <div class="relative">
          <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 pointer-events-none">
            <i data-lucide="map-pin" class="w-4 h-4 text-slate-500"></i>
          </span>
          <input type="text" id="direccion" name="direccion" placeholder="ej: Av. Siempre Viva 742" required
            maxlength="100" class="w-full bg-surface-700 border border-surface-500 text-white
                        placeholder-slate-600 rounded-xl pl-10 pr-4 py-3 text-sm
                        focus:outline-none focus:border-med-500 focus:ring-2 focus:ring-med-500/20
                        transition-all duration-200" />
        </div>
      </div>

      <!-- Teléfono -->
      <div class="space-y-1.5">
        <label for="telefono" class="block text-xs font-semibold text-slate-400 uppercase tracking-wider">
          Teléfono <span class="text-red-400">*</span>
        </label>
        <div class="relative">
          <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 pointer-events-none">
            <i data-lucide="phone" class="w-4 h-4 text-slate-500"></i>
          </span>
          <input type="tel" id="telefono" name="telefono" placeholder="ej: 76543212" required maxlength="8"
            pattern="[0-9]{8}" title="Ingresa exactamente 8 dígitos" class="w-full bg-surface-700 border border-surface-500 text-white
                        placeholder-slate-600 rounded-xl pl-10 pr-4 py-3 text-sm
                        font-mono tracking-wider
                        focus:outline-none focus:border-med-500 focus:ring-2 focus:ring-med-500/20
                        transition-all duration-200" />
        </div>
        <p class="text-[11px] text-slate-600 flex items-center gap-1">
          Exactamente 8 dígitos numéricos
        </p>
      </div>

      <!-- Botones -->
      <div class="flex gap-3 pt-2">

        <a href="{{ url_for('paciente.index') }}" class="flex-1 flex items-center justify-center gap-2 px-4 py-3 rounded-xl
                  border border-surface-500 text-slate-300
                  hover:bg-surface-700 hover:text-white
                  transition-all duration-150 text-sm font-medium">
          Cancelar
        </a>

        <button type="submit" class="flex-1 flex items-center justify-center gap-2 px-4 py-3 rounded-xl
                       bg-med-500 hover:bg-med-600 active:bg-med-700
                       text-white text-sm font-semibold
                       shadow-[0_0_20px_rgba(28,168,162,0.2)] hover:shadow-none
                       transition-all duration-200">
          <i data-lucide="save" class="w-4 h-4"></i>
          Registrar Paciente
        </button>

      </div>
    </form>
  </div>
</div>

{% endblock %}
